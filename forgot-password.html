<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Forgot Password - Eagl'd</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="custom-navbar navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="main.html">Eagl'd<span>.</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsFurni" aria-controls="navbarsFurni" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarsFurni">
        	<ul class="custom-navbar-nav navbar-nav ms-auto mb-2 mb-md-0">
						<li class="nav-item"><a class="nav-link" href="main.html">Home</a></li>
						<li><a class="nav-link" href="shop.html">Shop</a></li>
						<li><a class="nav-link" href="favorites.html">Favorites</a></li>
						<li><a class="nav-link" href="sell.html">Sell</a></li>
					</ul>
      </div>
    </div>
  </nav>

  <div class="container" style="max-width: 500px; margin-top: 60px;">
    <h2 class="mb-4 text-center">Forgot Password</h2>
    <div id="forgotAlert" class="alert d-none" role="alert"></div>
    <form id="forgotForm">
      <div class="mb-3">
        <label for="forgotEmail" class="form-label">UNT Email</label>
        <input type="email" class="form-control" id="forgotEmail" placeholder="you@my.unt.edu" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Send reset link</button>
    </form>
    <p class="mt-3 text-center">
      Remembered your password? <a href="login.html">Log in</a>
    </p>
  </div>

  <script>
    // Backend base URL for Amplify frontend
    const API_BASE = 'https://test-webiste-for-3444.onrender.com';

    const forgotForm = document.getElementById('forgotForm');
    const forgotAlert = document.getElementById('forgotAlert');

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      forgotAlert.className = 'alert d-none';
      forgotAlert.textContent = '';

      const email = document.getElementById('forgotEmail').value.trim();

      try {
        const res = await fetch(`${API_BASE}/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) {
          forgotAlert.className = 'alert alert-danger';
          forgotAlert.textContent = data.error || 'Could not send reset link.';
        } else {
          forgotAlert.className = 'alert alert-success';
          forgotAlert.textContent = 'If that email is registered, a reset link has been sent.';
        }
      } catch (err) {
        forgotAlert.className = 'alert alert-danger';
        forgotAlert.textContent = 'Network error. Please try again.';
      }
    });
  </script>

  <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
