<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Reset Password - Eagl'd</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="custom-navbar navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="main.html">Eagl'd<span>.</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsFurni" aria-controls="navbarsFurni" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarsFurni">
        	<ul class="custom-navbar-nav navbar-nav ms-auto mb-2 mb-md-0">
						<li class="nav-item"><a class="nav-link" href="main.html">Home</a></li>
						<li><a class="nav-link" href="shop.html">Shop</a></li>
						<li><a class="nav-link" href="favorites.html">Favorites</a></li>
						<li><a class="nav-link" href="sell.html">Sell</a></li>
					</ul>
      </div>
    </div>
  </nav>

  <div class="container" style="max-width: 500px; margin-top: 60px;">
    <h2 class="mb-4 text-center">Reset Password</h2>
    <div id="resetAlert" class="alert d-none" role="alert"></div>
    <form id="resetForm">
      <input type="hidden" id="resetToken">
      <div class="mb-3">
        <label for="resetPassword" class="form-label">New Password</label>
        <input type="password" class="form-control" id="resetPassword" required>
      </div>
      <div class="mb-3">
        <label for="resetPasswordConfirm" class="form-label">Confirm New Password</label>
        <input type="password" class="form-control" id="resetPasswordConfirm" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Set new password</button>
    </form>
  </div>

  <script>
    // Backend base URL for Amplify frontend
    const API_BASE = 'https://test-webiste-for-3444.onrender.com';

    function getTokenFromQuery() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token') || '';
    }

    const resetForm = document.getElementById('resetForm');
    const resetAlert = document.getElementById('resetAlert');
    const resetTokenInput = document.getElementById('resetToken');
    resetTokenInput.value = getTokenFromQuery();

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      resetAlert.className = 'alert d-none';
      resetAlert.textContent = '';

      const token = resetTokenInput.value;
      const password = document.getElementById('resetPassword').value;
      const confirm = document.getElementById('resetPasswordConfirm').value;

      if (password !== confirm) {
        resetAlert.className = 'alert alert-danger';
        resetAlert.textContent = 'Passwords do not match.';
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        if (!res.ok) {
          resetAlert.className = 'alert alert-danger';
          resetAlert.textContent = data.error || 'Could not reset password.';
        } else {
          resetAlert.className = 'alert alert-success';
          resetAlert.textContent = 'Password reset. Redirecting to login...';
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1200);
        }
      } catch (err) {
        resetAlert.className = 'alert alert-danger';
        resetAlert.textContent = 'Network error. Please try again.';
      }
    });
  </script>

  <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
