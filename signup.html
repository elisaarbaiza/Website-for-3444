<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Sign Up - Eagl'd</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="custom-navbar navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="main.html">Eagl'd<span>.</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsFurni" aria-controls="navbarsFurni" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarsFurni">
        	<ul class="custom-navbar-nav navbar-nav ms-auto mb-2 mb-md-0">
						<li class="nav-item"><a class="nav-link" href="main.html">Home</a></li>
						<li><a class="nav-link" href="shop.html">Shop</a></li>
						<li><a class="nav-link" href="favorites.html">Favorites</a></li>
						<li><a class="nav-link" href="sell.html">Sell</a></li>
					</ul>
      </div>
    </div>
  </nav>

  <div class="container" style="max-width: 500px; margin-top: 60px;">
    <h2 class="mb-4 text-center">Sign Up</h2>
    <div id="signupAlert" class="alert d-none" role="alert"></div>
    <form id="signupForm">
      <div class="mb-3">
        <label for="signupEmail" class="form-label">UNT Email</label>
        <input type="email" class="form-control" id="signupEmail" placeholder="you@my.unt.edu" required>
      </div>
      <div class="mb-3">
        <label for="signupPassword" class="form-label">Password</label>
        <input type="password" class="form-control" id="signupPassword" required>
      </div>
      <div class="mb-3">
        <label for="signupPasswordConfirm" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="signupPasswordConfirm" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Create account</button>
    </form>
    <p class="mt-3 text-center">
      Already have an account? <a href="login.html">Log in</a>
    </p>
  </div>

  <script type="module">
    import {
      auth,
      createUserWithEmailAndPassword,
      sendEmailVerification,
      signOut
    } from "./js/firebase-auth.js";

    const signupForm = document.getElementById("signupForm");
    const signupAlert = document.getElementById("signupAlert");

    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      signupAlert.className = "alert d-none";
      signupAlert.textContent = "";

      const email = document.getElementById("signupEmail").value.trim().toLowerCase();
      const password = document.getElementById("signupPassword").value;
      const confirm = document.getElementById("signupPasswordConfirm").value;

      if (password !== confirm) {
        signupAlert.className = "alert alert-danger";
        signupAlert.textContent = "Passwords do not match.";
        return;
      }

      if (!email.endsWith("@my.unt.edu")) {
        signupAlert.className = "alert alert-danger";
        signupAlert.textContent = "Please use a UNT email address.";
        return;
      }

      try {
        const credential = await createUserWithEmailAndPassword(auth, email, password);
        await sendEmailVerification(credential.user);
        await signOut(auth);
        signupAlert.className = "alert alert-success";
        signupAlert.textContent = "Account created. Check your UNT inbox to verify your email before logging in.";
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);
      } catch (err) {
        signupAlert.className = "alert alert-danger";
        signupAlert.textContent = err?.message || "Could not create account.";
      }
    });
  </script>

  <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
