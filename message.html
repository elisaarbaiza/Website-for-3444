<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Two‑Person Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <script src="js/auth-guard.js" data-protect-page></script>

  <style>
    body {
      background: #f2f4f3;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2a24;
    }

    .chat-container {
      max-width: 900px;
      margin: 32px auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      height: 84vh;
      overflow: hidden;
      border: 1px solid #dde5df;
    }

    .chat-header {
      padding: 14px 18px;
      background: #2f5d50;
      color: #ffffff;
      border-bottom: 1px solid #254a40;
    }

    .chat-header h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 700;
    }

    #activeConversationLabel {
      color: rgba(255, 255, 255, 0.85) !important;
    }

    .p-3.border-bottom.bg-light {
      background: #f8faf9 !important;
      border-color: #e4ebe6 !important;
    }

    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: linear-gradient(180deg, #f6f8f7 0%, #eef3f0 100%);
    }

    .message {
      margin-bottom: 10px;
      max-width: 72%;
      padding: 10px 13px;
      border-radius: 18px;
      position: relative;
      word-break: break-word;
      animation: popIn 0.12s ease-out;
    }

    @keyframes popIn {
      from {
        transform: translateY(4px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .message .sender {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 3px;
      opacity: 0.8;
    }

    .message.me {
      margin-left: auto;
      background: #2f5d50;
      color: #ffffff;
      border-bottom-right-radius: 6px;
      box-shadow: 0 3px 10px rgba(47, 93, 80, 0.25);
    }

    .message.me .sender {
      color: rgba(255, 255, 255, 0.88);
    }

    .message.them {
      margin-right: auto;
      background: #ffffff;
      color: #233129;
      border: 1px solid #d8e2dc;
      border-bottom-left-radius: 6px;
    }

    .message-text {
      white-space: pre-wrap;
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
    }

    .message-time {
      font-size: 10px;
      margin-top: 5px;
      opacity: 0.72;
    }

    .chat-input-area {
      border-top: 1px solid #e1e9e4;
      padding: 10px 14px;
      background: #ffffff;
    }

    .chat-input-area .form-control,
    .chat-input-area .btn {
      border-radius: 999px;
    }

    #messageInput {
      border: 1px solid #cfdad3;
      background: #f7faf8;
    }

    #messageInput:focus {
      border-color: #2f5d50;
      box-shadow: 0 0 0 0.2rem rgba(47, 93, 80, 0.18);
    }

    .btn-send,
    .btn-primary {
      background-color: #2f5d50 !important;
      border-color: #2f5d50 !important;
    }

    .btn-send:hover,
    .btn-primary:hover {
      background-color: #264d42 !important;
      border-color: #264d42 !important;
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <div>
        <h1>Messages</h1>
        <small id="activeConversationLabel" class="text-muted">No conversation selected yet</small>
      </div>
    </div>

    <div class="p-3 border-bottom bg-light">
      <form id="nameForm" class="row g-2 align-items-center mb-2">
        <div class="col-12 col-md-8">
          <input
            id="usernameInput"
            type="text"
            class="form-control"
            placeholder="Enter your name (e.g. buyer or seller)"
            autocomplete="off"
            required
          >
        </div>
        <div class="col-12 col-md-4 d-grid">
          <button type="submit" class="btn btn-outline-primary">Set my name</button>
        </div>
      </form>
      <form id="conversationForm" class="row g-2 align-items-center">
        <div class="col-12 col-md-8">
          <input
            id="otherUserInput"
            type="text"
            class="form-control"
            placeholder="Who do you want to chat with? (e.g. seller name)"
            autocomplete="off"
            required
          >
        </div>
        <div class="col-12 col-md-4 d-grid">
          <button type="submit" class="btn btn-secondary">Start / Open Chat</button>
        </div>
      </form>
      <small id="nameStatus" class="text-muted d-block mt-1"></small>
    </div>

    <div id="chatMessages" class="chat-messages">
      <!-- Messages for the current conversation will appear here -->
    </div>

    <div class="chat-input-area">
      <form id="chatForm" class="row g-2 align-items-center">
        <div class="col-12 col-md-10">
          <input
            id="messageInput"
            type="text"
            class="form-control"
            placeholder="Type a message and press Enter..."
            autocomplete="off"
            required
          >
        </div>
        <div class="col-12 col-md-2 d-grid">
          <button type="submit" class="btn btn-primary btn-send">Send</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Socket.IO client loaded from Render backend -->
  <script src="https://eagld-chat.onrender.com/socket.io/socket.io.js"></script>

  <script>
    // Connect to the Socket.IO server running on Render
    const socket = io('https://eagld-chat.onrender.com');

    const nameForm = document.getElementById('nameForm');
    const usernameInput = document.getElementById('usernameInput');
    const nameStatus = document.getElementById('nameStatus');

    const conversationForm = document.getElementById('conversationForm');
    const otherUserInput = document.getElementById('otherUserInput');
    const activeConversationLabel = document.getElementById('activeConversationLabel');

    const chatForm = document.getElementById('chatForm');
    const messageInput = document.getElementById('messageInput');
    const chatMessages = document.getElementById('chatMessages');

    let username = "";
    let currentConversationId = null;
    let currentOtherUser = "";

    function formatTime(date) {
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(sender, text, isSelf, createdAt) {
      const wrapper = document.createElement('div');
      wrapper.className = 'message ' + (isSelf ? 'me' : 'them');

      const time = createdAt ? new Date(createdAt) : new Date();

      wrapper.innerHTML = `
        <div class="sender">${sender}</div>
        <p class="message-text"></p>
        <div class="message-time">${formatTime(time)}</div>
      `;

      wrapper.querySelector('.message-text').textContent = text;

      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    nameForm.addEventListener('submit', function (e) {
      e.preventDefault();
      const value = usernameInput.value.trim();
      if (!value) return;

      username = value;
      usernameInput.disabled = true;
      this.querySelector('button[type="submit"]').disabled = true;
      nameStatus.textContent = 'You are logged in as "' + username + '". Now choose who you want to chat with below.';
    });

    conversationForm.addEventListener('submit', function (e) {
      e.preventDefault();
      if (!username) {
        alert('Set your name first at the top.');
        return;
      }

      const otherUser = otherUserInput.value.trim();
      if (!otherUser) return;

      socket.emit('join conversation', {
        currentUser: username,
        otherUser
      });
    });

    chatForm.addEventListener('submit', function (e) {
      e.preventDefault();
      if (!username) {
        alert('Set your name first at the top.');
        return;
      }

      const text = messageInput.value.trim();
      if (!text) return;

      socket.emit('chat message', {
        conversationId: currentConversationId,
        user: username,
        text: text
      });

      messageInput.value = '';
      messageInput.focus();
    });

    socket.on('conversation joined', function (data) {
      currentConversationId = data.conversationId;
      currentOtherUser = data.otherUser;

      // Clear current messages
      chatMessages.innerHTML = '';

      activeConversationLabel.textContent = 'Chatting with "' + currentOtherUser + '"';

      (data.messages || []).forEach(function (msg) {
        const isSelf = msg.sender === username;
        addMessage(msg.sender, msg.text, isSelf, msg.createdAt);
      });
    });

    socket.on('chat message', function (data) {
      if (!currentConversationId || data.conversationId !== currentConversationId) {
        // Message for a different conversation; ignore in this view
        return;
      }
      const isSelf = data.user === username;
      addMessage(data.user, data.text, isSelf, data.createdAt);
    });
  </script>
</body>
</html>
