<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Login - Eagl'd</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="custom-navbar navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Eagl'd<span>.</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsFurni" aria-controls="navbarsFurni" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarsFurni">
        <ul class="custom-navbar-nav navbar-nav ms-auto mb-2 mb-md-0">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li><a class="nav-link" href="shop.html">Shop</a></li>
          <li><a class="nav-link" href="about.html">About us</a></li>
          <li><a class="nav-link" href="contact.html">Sell</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container" style="max-width: 500px; margin-top: 60px;">
    <h2 class="mb-4 text-center">Login</h2>
    <div id="loginAlert" class="alert d-none" role="alert"></div>
    <form id="loginForm">
      <div class="mb-3">
        <label for="loginEmail" class="form-label">UNT Email</label>
        <input type="email" class="form-control" id="loginEmail" placeholder="you@my.unt.edu" required>
      </div>
      <div class="mb-3">
        <label for="loginPassword" class="form-label">Password</label>
        <input type="password" class="form-control" id="loginPassword" required>
      </div>
      <div class="form-check mb-3">
  <input class="form-check-input" type="checkbox" id="rememberMe">
  <label class="form-check-label" for="rememberMe">
    Remember me
  </label>
</div>
      <button type="submit" class="btn btn-primary w-100">Log in</button>
    </form>
    <p class="mt-3 text-center">
      Don't have an account? <a href="signup.html">Sign up</a><br>
      <a href="forgot-password.html">Forgot your password?</a>
    </p>
  </div>

  <script>
    // Backend base URL for Amplify frontend
    const API_BASE = 'https://test-webiste-for-3444.onrender.com';

    const loginForm = document.getElementById('loginForm');
    const loginAlert = document.getElementById('loginAlert');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginAlert.className = 'alert d-none';
      loginAlert.textContent = '';

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password, rememberMe})
        });

        const data = await res.json();

        if (!res.ok) {
          loginAlert.className = 'alert alert-danger';
          loginAlert.textContent = data.error || 'Login failed.';
        } else {
          loginAlert.className = 'alert alert-success';
          loginAlert.textContent = 'Logged in successfully. Redirecting...';
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
        }
      } catch (err) {
        loginAlert.className = 'alert alert-danger';
        loginAlert.textContent = 'Network error. Please try again.';
      }
    });
  </script>

  <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
